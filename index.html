<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLAME ALIGN0 - Digital Wayfinder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Strict Mobile Viewport Lock */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #111; }

        .app-container { display: flex; flex-direction: column; width: 100%; height: 100%; position: relative; }

        /* Fullscreen Map Canvas */
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; background: #1a1a1a; }
        .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }

        /* Floating Minimal Header */
        .top-brand { position: absolute; top: 20px; left: 20px; z-index: 1000; color: white; font-weight: 800; font-size: 18px; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .top-brand span { color: #3b82f6; }

        /* * ALIGN0 Dot Styling (The Core Concept)
         * Default: Dim, neutral gray, just a number.
         */
        .align-dot { 
            width: 24px; height: 24px; background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255,255,255,0.4); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            color: #ccc; font-size: 11px; font-weight: 700; transition: all 0.4s ease;
            backdrop-filter: blur(4px);
        }
        
        /* State 1: Fade out unselected nodes */
        .dimmed .align-dot { opacity: 0.15; transform: scale(0.8); }
        
        /* State 2: Source Node (Blue Pulse) */
        .align-dot.source-active { 
            background: #3b82f6; border-color: #60a5fa; color: white; opacity: 1 !important; 
            transform: scale(1.3); box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); 
        }
        
        /* State 3: Destination Node (Green Pulse) */
        .align-dot.dest-active { 
            background: #10b981; border-color: #34d399; color: white; opacity: 1 !important; 
            transform: scale(1.3); box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); 
        }

        /* Bottom Alignment Control Drawer */
        .alignment-drawer { 
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000; 
            background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1); border-top-left-radius: 24px; border-top-right-radius: 24px; 
            padding: 24px 20px 32px 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); 
            display: flex; flex-direction: column; gap: 16px; 
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { color: #888; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        select { 
            width: 100%; appearance: none; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.2); color: white; padding: 14px 16px; 
            border-radius: 12px; font-size: 15px; font-weight: 600; outline: none; 
            transition: border-color 0.2s;
        }
        select:focus { border-color: #3b82f6; }
        select:disabled { opacity: 0.5; }

        .select-source { border-left: 4px solid #3b82f6; }
        .select-dest { border-left: 4px solid #10b981; }

        #reset-btn { 
            display: none; background: transparent; color: #ef4444; 
            border: 1px solid #ef4444; padding: 12px; border-radius: 12px; 
            font-size: 14px; font-weight: 700; text-align: center; cursor: pointer; 
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-brand">FLAME<span>ALIGN</span></div>

        <div id="map"></div>

        <div class="alignment-drawer">
            <div class="input-group">
                <label>Source Node</label>
                <select id="source-select" class="select-source" onchange="processAlignment()">
                    <option value="" disabled selected>Where are you?</option>
                    <option value="3">3. Vivekananda Library</option>
                    <option value="6">6. Chanakya Lecture Theatre</option>
                    <option value="18">18. Arjuna Sports Centre</option>
                    <option value="30">30. Blue Tokai Cafe</option>
                </select>
            </div>

            <div class="input-group">
                <label>Destination Node</label>
                <select id="dest-select" class="select-dest" onchange="processAlignment()">
                    <option value="" disabled selected>Where are you going?</option>
                    <option value="3">3. Vivekananda Library</option>
                    <option value="6">6. Chanakya Lecture Theatre</option>
                    <option value="18">18. Arjuna Sports Centre</option>
                    <option value="30">30. Blue Tokai Cafe</option>
                </select>
            </div>

            <div id="reset-btn" onclick="resetGrid()">Clear Alignment</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Init map with a sleek Dark Mode base layer to act as our neutral canvas
        const map = L.map('map', { zoomControl: false }).setView([18.5202, 73.7385], 18);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

        // Core logic variables
        let markers = {};
        let activeRoute = null;

        // The Dataset (IDs match the physical numbers)
        const campusNodes = [
            { id: "3", lat: 18.52025, lng: 73.73902 },
            { id: "6", lat: 18.51980, lng: 73.73830 },
            { id: "18", lat: 18.52180, lng: 73.73850 },
            { id: "30", lat: 18.51950, lng: 73.73895 }
        ];

        // Path Data
        const routeData = {
            "3-to-30": [[18.52025, 73.73902], [18.51990, 73.73910], [18.51950, 73.73895]],
            "6-to-3": [[18.51980, 73.73830], [18.51995, 73.73860], [18.52025, 73.73902]],
            "18-to-3": [[18.52180, 73.73850], [18.52090, 73.73870], [18.52025, 73.73902]]
        };

        // Render the neutral grid of numbers
        function renderGrid() {
            campusNodes.forEach(node => {
                const icon = L.divIcon({
                    className: 'node-wrapper', // Wrapper to handle fading
                    html: `<div class="align-dot" id="dot-${node.id}">${node.id}</div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });
                markers[node.id] = L.marker([node.lat, node.lng], { icon: icon }).addTo(map);
            });
        }

        // The Alignment Engine
        function processAlignment() {
            const sourceId = document.getElementById('source-select').value;
            const destId = document.getElementById('dest-select').value;

            // Step 1: Reset all dots to neutral state
            document.querySelectorAll('.align-dot').forEach(el => {
                el.className = 'align-dot'; 
            });
            document.querySelector('.leaflet-marker-pane').classList.remove('dimmed');
            if (activeRoute) map.removeLayer(activeRoute);

            // Step 2: If at least one is selected, dim the rest of the map
            if (sourceId || destId) {
                document.querySelector('.leaflet-marker-pane').classList.add('dimmed');
                document.getElementById('reset-btn').style.display = "block";
            }

            // Step 3: Illuminate Source
            if (sourceId) {
                const sourceDot = document.getElementById(`dot-${sourceId}`);
                if (sourceDot) sourceDot.classList.add('source-active');
                map.panTo(markers[sourceId].getLatLng()); // Auto-snap camera
            }

            // Step 4: Illuminate Destination
            if (destId) {
                const destDot = document.getElementById(`dot-${destId}`);
                if (destDot) destDot.classList.add('dest-active');
            }

            // Step 5: If aligned perfectly (both selected), draw glowing path
            if (sourceId && destId) {
                if (sourceId === destId) return; // Ignore same-node routing
                
                const key = `${sourceId}-to-${destId}`;
                const revKey = `${destId}-to-${sourceId}`;
                const path = routeData[key] || routeData[revKey];

                if (path) {
                    activeRoute = L.polyline(path, { 
                        color: '#ffffff', weight: 4, opacity: 0.9, dashArray: '8, 8',
                        className: 'glowing-route' // Optional advanced CSS glowing animation
                    }).addTo(map);
                    
                    // Zoom map perfectly to fit both dots and the line
                    map.fitBounds(activeRoute.getBounds(), { padding: [80, 80] });
                }
            }
        }

        function resetGrid() {
            document.getElementById('source-select').value = "";
            document.getElementById('dest-select').value = "";
            
            document.querySelectorAll('.align-dot').forEach(el => {
                el.className = 'align-dot'; 
            });
            document.querySelector('.leaflet-marker-pane').classList.remove('dimmed');
            if (activeRoute) map.removeLayer(activeRoute);
            
            document.getElementById('reset-btn').style.display = "none";
            map.setView([18.5202, 73.7385], 18);
        }

        // Initialize App
        renderGrid();
    </script>
</body>
</html>
