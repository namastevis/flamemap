<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAME University Wayfinder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #instruction-bar { background: #333; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 14px; }
        #map { flex-grow: 1; width: 100%; }
        #filter-container { padding: 10px; background: #eee; display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; }
        .filter-btn { background: white; border: 1px solid #ccc; padding: 8px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .filter-btn.active { background: #007bff; color: white; border-color: #0056b3; }
        #reset-btn { background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 20px; font-size: 13px; display: none; }
    </style>
</head>
<body>

    <div id="instruction-bar">📍 Step 1: Tap your starting building on the map</div>

    <div id="filter-container">
        <button id="reset-btn" onclick="resetNavigation()">❌ Clear Route</button>
        <button class="filter-btn" onclick="filterPins('academics')">📚 Academics</button>
        <button class="filter-btn" onclick="filterPins('eateries')">☕ Eateries</button>
        <button class="filter-btn" onclick="filterPins('housing')">🏠 Housing</button>
        <button class="filter-btn" onclick="filterPins('sports')">⚽ Sports</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map centered around FLAME University coordinates
        const map = L.map('map').setView([18.4905, 73.7480], 17);

        // Load Free OpenStreetMap Tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // State Tracking for Option B Guided Workflow
        let currentStep = 1; 
        let startLocation = null;
        let endLocation = null;
        let activeRouteLine = null;
        let markersGroup = L.layerGroup().addTo(map);

        // Dummy coordinates database mapped to your image locations
        const campusData = [
            { id: "3", name: "Vivekananda Library", category: "academics", lat: 18.4905, lng: 73.7480 },
            { id: "6", name: "Chanakya", category: "academics", lat: 18.4899, lng: 73.7475 },
            { id: "30", name: "Blue Tokai Cafe", category: "eateries", lat: 18.4912, lng: 73.7485 },
            { id: "40", name: "North Housing", category: "housing", lat: 18.4925, lng: 73.7460 }
        ];

        // Pre-defined static path arrays between points (V1 static routing)
        const pathRoutes = {
            "3-to-30": [[18.4905, 73.7480], [18.4909, 73.7482], [18.4912, 73.7485]],
            "6-to-3: [[18.4899, 73.7475], [18.4902, 73.7478], [18.4905, 73.7480]]
        };

        // Render standard category pins
        function filterPins(category) {
            markersGroup.clearLayers();
            campusData.filter(loc => loc.category === category).forEach(loc => {
                const marker = L.marker([loc.lat, loc.lng]).addTo(markersGroup);
                marker.bindPopup(`<b>${loc.name}</b><br><button onclick="handleLocationSelect('${loc.id}', '${loc.name}')">Select</button>`);
            });
        }

        // Handle the Step-by-Step Logic
        function handleLocationSelect(id, name) {
            map.closePopup();
            if (currentStep === 1) {
                startLocation = id;
                document.getElementById('instruction-bar').innerText = `🛫 From: ${name} -> 🏁 Step 2: Tap your destination building`;
                currentStep = 2;
            } else if (currentStep === 2) {
                endLocation = id;
                drawRoute(startLocation, endLocation);
            }
        }

        // Draw the static path line
        function drawRoute(start, end) {
            const routeKey = `${start}-to-${end}`;
            const reverseRouteKey = `${end}-to-${start}`;
            let points = pathRoutes[routeKey] || pathRoutes[reverseRouteKey];

            if (points) {
                if (activeRouteLine) map.removeLayer(activeRouteLine);
                activeRouteLine = L.polyline(points, { color: '#007bff', weight: 6, opacity: 0.8 }).addTo(map);
                map.fitBounds(activeRouteLine.getBounds(), { padding: [50, 50] });
                
                document.getElementById('instruction-bar').innerText = "🎉 Route Found! Follow the blue line.";
                document.getElementById('reset-btn').style.display = "inline-block";
            } else {
                document.getElementById('instruction-bar').innerText = "❌ Direct path data not set for this route yet.";
                document.getElementById('reset-btn').style.display = "inline-block";
            }
        }

        function resetNavigation() {
            if (activeRouteLine) map.removeLayer(activeRouteLine);
            currentStep = 1;
            startLocation = null;
            endLocation = null;
            document.getElementById('instruction-bar').innerText = "📍 Step 1: Tap your starting building on the map";
            document.getElementById('reset-btn').style.display = "none";
            markersGroup.clearLayers();
        }
    </script>
</body>
</html>
