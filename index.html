<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLAME Wayfinder - Live OSM Base</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <style>
        /* CSS Reset & Base Variables */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #e5e7eb;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Mobile App Container */
        .app-container {
            width: 100%;
            max-width: 430px; 
            height: 100%;
            position: relative;
            background-color: #f3f4f6;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 2. The Real Map Container */
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Hide the default Leaflet attribution for a cleaner mobile app look 
           (In production, ensure you attribute OSM elsewhere in the app settings) */
        .leaflet-control-attribution {
            display: none;
        }

        /* Custom Map Marker Style */
        .custom-marker {
            width: 24px;
            height: 24px;
            background-color: #ef4444;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .custom-marker:active {
            transform: scale(1.2);
        }

        /* The Thumb Zone / Bottom Sheet (Z-index must be higher than Leaflet) */
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 20px 20px 40px 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            z-index: 1000; /* Increased to stay above map controls */
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Bottom Sheet UI Elements (Same as before) */
        .sheet-handle {
            width: 40px;
            height: 5px;
            background-color: #d1d5db;
            border-radius: 10px;
            margin: 0 auto 20px auto;
        }

        .search-container { position: relative; margin-bottom: 20px; }
        .search-input {
            width: 100%; padding: 16px 16px 16px 48px; background-color: #f3f4f6;
            border: none; border-radius: 16px; font-size: 16px; color: #1f2937; outline: none;
        }
        .search-input:focus { box-shadow: 0 0 0 2px #3b82f6; }
        .search-icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; fill: #6b7280;
        }

        .categories {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }
        
        .category-chip { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 72px; cursor: pointer; }
        .chip-icon { width: 56px; height: 56px; background-color: #f3f4f6; border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .chip-label { font-size: 12px; color: #4b5563; font-weight: 500; }

        .location-card { display: none; flex-direction: column; gap: 12px; }
        .location-image-placeholder { width: 100%; height: 140px; background-color: #e5e7eb; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #9ca3af; font-size: 14px; }
        .location-header h2 { font-size: 20px; color: #111827; margin-bottom: 4px; }
        .location-header p { font-size: 14px; color: #6b7280; }
        
        .btn-navigate {
            width: 100%; padding: 16px; background-color: #2563eb; color: white;
            border: none; border-radius: 16px; font-size: 16px; font-weight: 600;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="map"></div>

    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle"></div>

        <div id="defaultView">
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M10 2a8 8 0 105.293 14.707l5 5a1 1 0 001.414-1.414l-5-5A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
                <input type="text" class="search-input" placeholder="Where do you want to go?">
            </div>

            <div class="categories">
                <div class="category-chip"><div class="chip-icon">📚</div><span class="chip-label">Classes</span></div>
                <div class="category-chip"><div class="chip-icon">☕</div><span class="chip-label">Food</span></div>
                <div class="category-chip"><div class="chip-icon">🛏️</div><span class="chip-label">Hostels</span></div>
                <div class="category-chip"><div class="chip-icon">⚽</div><span class="chip-label">Sports</span></div>
                <div class="category-chip"><div class="chip-icon">🚌</div><span class="chip-label">Services</span></div>
            </div>
        </div>

        <div class="location-card" id="locationView">
            <div class="location-image-placeholder">
                [ Real Photo of the Building ]
            </div>
            <div class="location-header">
                <h2 id="locationTitle">Campus Center</h2>
                <p id="locationDesc">General Campus Area</p>
            </div>
            <button class="btn-navigate">
                <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M21.5 11.1l-17-9A1 1 0 003 3v18a1 1 0 001.5.9l17-9a1 1 0 000-1.8zM5 18.2V5.8l11.7 6.2L5 18.2z"/></svg>
                Start Navigation
            </button>
            <button class="btn-navigate" style="background-color: #f3f4f6; color: #374151; margin-top: 0;" id="closeLocationBtn">
                Back to Search
            </button>
        </div>

    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
    // --- 1. INITIALIZE THE REAL MAP ---
    // Coordinates for FLAME University (approximate campus center)
    const flameCoords = [18.5348, 73.7431]; // Adjusted slightly for better centering on the Lavale campus map features

    // Initialize the map, set view to FLAME with a high zoom level (16)
    // Zoom control is moved to top right to avoid our bottom sheet
    const map = L.map('map', {
        zoomControl: false 
    }).setView(flameCoords, 16);

    // Add zoom control manually to the top right
    L.control.zoom({
        position: 'topright'
    }).addTo(map);

    // Load OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
    }).addTo(map);


    // --- 2. ADD A CUSTOM MARKER ---
    // We create a custom HTML marker rather than the default blue pin 
    // to match our modern UI design.
    const customIcon = L.divIcon({
        className: 'custom-marker',
        iconSize: [24, 24],
        iconAnchor: [12, 12] // Centers the icon over the coordinate
    });

    // Drop the marker near the center of campus
    const marker = L.marker([18.5340, 73.7435], { icon: customIcon }).addTo(map);


    // --- 3. UI INTERACTION LOGIC ---
    const defaultView = document.getElementById('defaultView');
    const locationView = document.getElementById('locationView');
    const closeBtn = document.getElementById('closeLocationBtn');
    const locationTitle = document.getElementById('locationTitle');
    const locationDesc = document.getElementById('locationDesc');

    // When the map marker is clicked
    marker.on('click', function() {
        // Update the bottom sheet content
        locationTitle.innerText = "Central Campus Area";
        locationDesc.innerText = "FLAME University, Lavale";
        
        // Switch the view
        defaultView.style.display = 'none';
        locationView.style.display = 'flex';
        
        // Optional: Center the map on the clicked marker smoothly
        map.flyTo(marker.getLatLng(), 17);
    });

    // When the close button is clicked
    closeBtn.addEventListener('click', () => {
        locationView.style.display = 'none';
        defaultView.style.display = 'block';
    });

    // Optional: Clicking anywhere on the empty map closes the location card
    map.on('click', function() {
        if (locationView.style.display === 'flex') {
            locationView.style.display = 'none';
            defaultView.style.display = 'block';
        }
    });

</script>

</body>
</html>
