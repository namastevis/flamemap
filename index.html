<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLAME Wayfinder</title>
    <style>
        /* CSS Reset & Base Variables */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #e5e7eb;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Mobile App Container (limits width on desktop for testing) */
        .app-container {
            width: 100%;
            max-width: 430px; /* Max iPhone width */
            height: 100%;
            position: relative;
            background-color: #f3f4f6;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 1. The Map Area (Top 70%) */
        .map-layer {
            width: 100%;
            height: 100%;
            background-color: #d1fae5; /* Placeholder green for campus */
            background-image: radial-gradient(#9ca3af 1px, transparent 1px);
            background-size: 20px 20px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mock Map Marker */
        .map-marker {
            width: 24px;
            height: 24px;
            background-color: #ef4444;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .map-marker:active {
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* 2. The Thumb Zone / Bottom Sheet (Bottom 30%+) */
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 20px 20px 40px 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            z-index: 10;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Drag Handle Indicator */
        .sheet-handle {
            width: 40px;
            height: 5px;
            background-color: #d1d5db;
            border-radius: 10px;
            margin: 0 auto 20px auto;
        }

        /* Search Bar */
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background-color: #f3f4f6;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            color: #1f2937;
            outline: none;
        }

        .search-input:focus {
            background-color: #e5e7eb;
            box-shadow: 0 0 0 2px #3b82f6;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: #6b7280;
        }

        /* Quick Tap Categories */
        .categories {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none; /* Firefox */
        }
        
        .categories::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .category-chip {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 72px;
            cursor: pointer;
        }

        .chip-icon {
            width: 56px;
            height: 56px;
            background-color: #f3f4f6;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            transition: background-color 0.2s;
        }

        .category-chip:active .chip-icon {
            background-color: #e5e7eb;
        }

        .chip-label {
            font-size: 12px;
            color: #4b5563;
            font-weight: 500;
        }

        /* Dynamic Location Card (Hidden by default) */
        .location-card {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .location-image-placeholder {
            width: 100%;
            height: 140px;
            background-color: #e5e7eb;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            font-size: 14px;
        }

        .location-header h2 {
            font-size: 20px;
            color: #111827;
            margin-bottom: 4px;
        }

        .location-header p {
            font-size: 14px;
            color: #6b7280;
        }

        .btn-navigate {
            width: 100%;
            padding: 16px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-navigate:active {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="map-layer">
        <div style="position: absolute; top: 20px; left: 20px; color: #047857; font-weight: bold; opacity: 0.5;">
            2D Canvas / MapLibre Goes Here
        </div>
        <div class="map-marker" id="sportsComplexMarker"></div>
    </div>

    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle"></div>

        <div id="defaultView">
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24">
                    <path d="M10 2a8 8 0 105.293 14.707l5 5a1 1 0 001.414-1.414l-5-5A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/>
                </svg>
                <input type="text" class="search-input" placeholder="Where do you want to go?">
            </div>

            <div class="categories">
                <div class="category-chip">
                    <div class="chip-icon">📚</div>
                    <span class="chip-label">Classes</span>
                </div>
                <div class="category-chip">
                    <div class="chip-icon">☕</div>
                    <span class="chip-label">Food</span>
                </div>
                <div class="category-chip">
                    <div class="chip-icon">🛏️</div>
                    <span class="chip-label">Hostels</span>
                </div>
                <div class="category-chip">
                    <div class="chip-icon">⚽</div>
                    <span class="chip-label">Sports</span>
                </div>
                <div class="category-chip">
                    <div class="chip-icon">🚌</div>
                    <span class="chip-label">Services</span>
                </div>
            </div>
        </div>

        <div class="location-card" id="locationView">
            <div class="location-image-placeholder">
                [ High-Contrast Photo of Landmark ]
            </div>
            <div class="location-header">
                <h2>Arjuna Sports Complex</h2>
                <p>Near student housing • Swimming, Gym, Courts</p>
            </div>
            <button class="btn-navigate">
                <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M21.5 11.1l-17-9A1 1 0 003 3v18a1 1 0 001.5.9l17-9a1 1 0 000-1.8zM5 18.2V5.8l11.7 6.2L5 18.2z"/></svg>
                Start Navigation
            </button>
            <button class="btn-navigate" style="background-color: #f3f4f6; color: #374151; margin-top: 0;" id="closeLocationBtn">
                Close
            </button>
        </div>

    </div>

</div>

<script>
    // Simple UI interaction logic to demonstrate the bottom sheet transition
    const marker = document.getElementById('sportsComplexMarker');
    const defaultView = document.getElementById('defaultView');
    const locationView = document.getElementById('locationView');
    const closeBtn = document.getElementById('closeLocationBtn');
    const searchInput = document.querySelector('.search-input');

    // When the map marker is tapped
    marker.addEventListener('click', () => {
        defaultView.style.display = 'none';
        locationView.style.display = 'flex';
    });

    // When the close button on the location card is tapped
    closeBtn.addEventListener('click', () => {
        locationView.style.display = 'none';
        defaultView.style.display = 'block';
    });

    // Clear input focus if tapped outside (simulating mobile keyboard dismiss)
    document.querySelector('.map-layer').addEventListener('click', () => {
        searchInput.blur();
    });
</script>

</body>
</html>
